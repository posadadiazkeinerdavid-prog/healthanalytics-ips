version: '3.9'

services:
  db:
    image: mysql:8.0
    container_name: healthanalytics_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: healthanalytics_db
      MYSQL_USER: healthanalytics
      MYSQL_PASSWORD: HealthAnalytics2024!
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docs/setup_mysql.sql:/docker-entrypoint-initdb.d/setup.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: healthanalytics_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: your-secret-key-change-in-production
      DEBUG: "False"
      DB_NAME: healthanalytics_db
      DB_USER: healthanalytics
      DB_PASSWORD: HealthAnalytics2024!
      DB_HOST: db
      DB_PORT: "3306"
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./datasets:/app/../datasets
      - ./ml_models:/app/../ml_models
      - ./logs:/app/../logs
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_users &&
             python manage.py runserver 0.0.0.0:8000"

volumes:
  mysql_data:
