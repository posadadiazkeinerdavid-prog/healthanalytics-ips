<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthAnalytics IPS — Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { min-height:100vh; background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0d6efd 100%); display:flex; align-items:center; justify-content:center; font-family:'Segoe UI',sans-serif; }
        .login-card { background:#fff; border-radius:20px; padding:2.5rem; width:100%; max-width:420px; box-shadow:0 24px 60px rgba(0,0,0,.4); }
        .logo-circle { width:64px; height:64px; background:#0d6efd; border-radius:16px; display:flex; align-items:center; justify-content:center; margin:0 auto 1rem; }
        .btn-login { background:#0d6efd; border:none; padding:.75rem; font-weight:600; font-size:1rem; }
        .btn-login:hover { background:#0b5ed7; }
        .input-group-text { background:#f8f9fa; border-right:none; }
        .form-control { border-left:none; }
        .alert-demo { background:#f0f9ff; border:1px solid #bae6fd; border-radius:10px; font-size:.82rem; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="text-center mb-4">
        <div class="logo-circle"><i class="bi bi-hospital-fill text-white" style="font-size:1.8rem"></i></div>
        <h4 class="mb-0" style="font-weight:700">HealthAnalytics IPS</h4>
        <p class="text-muted small">Plataforma de Analítica Clínica Inteligente</p>
    </div>
    <div id="alertError" class="alert alert-danger d-none"></div>
    <form id="loginForm">
        <div class="mb-3">
            <label class="form-label small" style="font-weight:600">Correo Electrónico</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope text-muted"></i></span>
                <input type="email" id="email" class="form-control" placeholder="admin@healthanalytics.com" required>
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label small" style="font-weight:600">Contraseña</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock text-muted"></i></span>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                <button class="btn btn-outline-secondary" type="button" id="togglePwd"><i class="bi bi-eye"></i></button>
            </div>
        </div>
        <button type="submit" class="btn btn-login btn-primary w-100 text-white" id="btnLogin">
            <span id="loginText"><i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión</span>
            <span id="loginSpinner" class="d-none"><span class="spinner-border spinner-border-sm me-2"></span>Autenticando...</span>
        </button>
    </form>
    <div class="alert-demo mt-4 p-3">
        <strong><i class="bi bi-info-circle me-1"></i>Credenciales demo:</strong><br>
        <code>admin@healthanalytics.com</code> / <code>Admin1234!</code>
    </div>
    <p class="text-center text-muted small mt-3 mb-0"><i class="bi bi-shield-check me-1"></i>Conexión segura con JWT</p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    if (localStorage.getItem('access_token')) window.location.href = '/';
    document.getElementById('togglePwd').addEventListener('click', () => {
        const p = document.getElementById('password'), i = document.querySelector('#togglePwd i');
        p.type = p.type === 'password' ? 'text' : 'password';
        i.className = p.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
    });
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const errBox = document.getElementById('alertError');
        document.getElementById('loginText').classList.add('d-none');
        document.getElementById('loginSpinner').classList.remove('d-none');
        errBox.classList.add('d-none');
        try {
            const res = await fetch('/api/auth/login/', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email,password}) });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || 'Credenciales incorrectas');
            localStorage.setItem('access_token', data.access);
            localStorage.setItem('refresh_token', data.refresh);
            localStorage.setItem('user', JSON.stringify(data.user));
            window.location.href = '/';
        } catch (err) {
            errBox.textContent = err.message;
            errBox.classList.remove('d-none');
        } finally {
            document.getElementById('loginText').classList.remove('d-none');
            document.getElementById('loginSpinner').classList.add('d-none');
        }
    });
</script>
</body>
</html>
